server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Nén Gzip để tăng tốc độ load trang
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # Try to serve file directly, fallback to index.html (for React Router SPA)
        try_files $uri $uri/ /index.html;
    }

    # Cache các file tĩnh (js, css, images) để tăng performance
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Bỏ qua lỗi 404 cho favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Bỏ qua robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }
}
